spring.application.name=backend

server.port= 8888

# MySQL Configuration

# for UTC time
# spring.datasource.url=jdbc:mysql://localhost:3306/incidenttrack_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

# For local time 

# Using the Padded Numeric Offset
# spring.datasource.url=jdbc:mysql://localhost:3306/incidenttrack_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2B05:30
# spring.jpa.properties.hibernate.jdbc.time_zone= GMT+05:30

# Using the Region ID (Highly Recommended)
spring.datasource.url=jdbc:mysql://localhost:3306/incidenttrack_db_v2?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Logging SQL
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE 
 
# Initializing .sql files
spring.sql.init.data-locations=classpath:*.sql

# This will prevent the .sql files from running every time the application starts, which is generally recommended for production environments. You can switch to ALWAYS if you want to run the .sql files every time, but be cautious as it may lead to unintended consequences in a production environment.
spring.sql.init.mode=NEVER

# This will run the .sql files every time the application starts, which is not recommended for production environments.
# spring.sql.init.mode=ALWAYS

spring.jpa.defer-datasource-initialization=true
# This prevents the app from crashing if the Index already exists
# spring.sql.init.continue-on-error=true
spring.sql.init.continue-on-error=false

# HikariCP connection pool tuning
# Increased pool size to handle SSE long-lived connections + regular API requests
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=5
# How long to wait for a connection before throwing an error (10s)
spring.datasource.hikari.connection-timeout=10000
# How long a connection can stay idle before being closed (10 min)
spring.datasource.hikari.idle-timeout=600000
# Max lifetime of a connection in the pool (25 min, less than MySQL's wait_timeout)
spring.datasource.hikari.max-lifetime=1500000
# Validate connections before use
spring.datasource.hikari.connection-test-query=SELECT 1
